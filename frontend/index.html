<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e10" />
    <title>Pipecat × Avaturn Live demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e0e10;
        --fg: #e8e8ea;
        --muted: #8c8c93;
        --surface: #18181b;
        --surface-2: #26262b;
        --accent: #ffffff;
        --danger: #ef4444;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        overscroll-behavior: none;
      }
      body {
        display: flex;
        flex-direction: column;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
                 env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      header {
        padding: 0.875rem 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-shrink: 0;
      }
      header h1 {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      header .label {
        color: var(--muted);
        font-size: 0.8rem;
      }

      main {
        position: relative;
        flex: 1;
        display: grid;
        place-items: center;
        padding: 1rem;
        min-height: 0;
      }

      .stage {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: min(720px, 100%);
        max-height: 100%;
        aspect-ratio: 1 / 1;
      }
      #avatar {
        position: absolute;
        inset: 0;
        border-radius: 18px;
        overflow: hidden;
        background: var(--surface);
      }

      /* Status pill */
      #status {
        position: absolute;
        top: 0.75rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 0.35rem 0.8rem;
        border-radius: 999px;
        background: rgba(14, 14, 16, 0.72);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: var(--fg);
        font-size: 0.75rem;
        letter-spacing: 0.02em;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
        white-space: nowrap;
        max-width: calc(100% - 1.5rem);
        overflow: hidden;
        text-overflow: ellipsis;
      }
      body[data-state="connecting"] #status,
      body[data-state="error"]      #status {
        opacity: 1;
      }

      /* Centered Join overlay (idle state) */
      .join-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, rgba(14,14,16,0.0) 0%, rgba(14,14,16,0.55) 100%);
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }
      body[data-state="active"] .join-overlay,
      body[data-state="leaving"] .join-overlay {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Bottom controls (active state) */
      .controls {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 1rem;
        padding: 0 1rem;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0.75rem;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, visibility 0.2s ease;
      }
      .controls .spacer { /* keeps Mute centered between left spacer & Leave */ }
      body[data-state="active"] .controls {
        opacity: 1;
        visibility: visible;
      }

      .controls #mute     { justify-self: center; }
      .controls #leave    { justify-self: end; }

      /* Buttons */
      button {
        font: inherit;
        border: 0;
        cursor: pointer;
        white-space: nowrap;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.05s ease, background 0.15s ease, color 0.15s ease;
      }
      button[disabled] { opacity: 0.5; cursor: not-allowed; }
      button:not([disabled]):active { transform: scale(0.97); }

      .btn-primary {
        background: var(--accent);
        color: #0e0e10;
        padding: 0.95rem 2.25rem;
        border-radius: 999px;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.02em;
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      }

      .btn-pill {
        background: rgba(26, 26, 30, 0.78);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: var(--fg);
        padding: 0.7rem 1.15rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.9rem;
        min-height: 44px;
        min-width: 44px;
      }
      .btn-pill.muted {
        background: rgba(239, 68, 68, 0.88);
        color: #fff;
      }
      .btn-pill.danger {
        background: rgba(239, 68, 68, 0.88);
        color: #fff;
      }

      /* Mobile tweaks */
      @media (max-width: 640px) {
        header { padding: 0.625rem 1rem; }
        header h1 { font-size: 0.85rem; }
        header .label { display: none; }
        main { padding: 0.5rem; }
        .stage { aspect-ratio: auto; }
        #avatar { border-radius: 14px; }
        .controls { bottom: max(0.75rem, env(safe-area-inset-bottom)); }
        .btn-primary { padding: 1rem 2rem; font-size: 1rem; }
      }
    </style>
  </head>
  <body data-state="idle">
    <header>
      <h1>Pipecat × Avaturn Live</h1>
      <span class="label">open-source demo</span>
    </header>

    <main>
      <div class="stage">
        <div id="avatar"></div>

        <div id="status">idle</div>

        <div class="join-overlay">
          <button id="join" class="btn-primary" aria-label="Join">Join</button>
        </div>

        <div class="controls" aria-hidden="false">
          <span class="spacer"></span>
          <button id="mute" class="btn-pill" disabled aria-label="Toggle microphone">Mute</button>
          <button id="leave" class="btn-pill danger" disabled aria-label="Leave session">Leave</button>
        </div>
      </div>
    </main>

    <script type="module">
      import { AvaturnHead } from "https://esm.sh/@avaturn-live/web-sdk@0.4.5";

      const $body = document.body;
      const $avatar = document.getElementById("avatar");
      const $join = document.getElementById("join");
      const $mute = document.getElementById("mute");
      const $leave = document.getElementById("leave");
      const $status = document.getElementById("status");

      let head = null;

      const setState = (state) => $body.setAttribute("data-state", state);
      const setStatus = (text) => ($status.textContent = text);

      const renderMicState = (micOn) => {
        $mute.textContent = micOn ? "Mute" : "Unmute";
        $mute.classList.toggle("muted", !micOn);
      };

      $join.addEventListener("click", async () => {
        $join.disabled = true;
        setState("connecting");
        setStatus("requesting microphone…");
        try {
          // Trigger the mic permission prompt inside the click gesture;
          // Daily picks up the granted permission on join.
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach((t) => t.stop());

          setStatus("creating session…");
          const res = await fetch("/api/sessions", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({}),
          });
          if (!res.ok) {
            const body = await res.text();
            throw new Error(`session create failed: ${res.status} ${body}`);
          }
          const { token, api_host: apiHost } = await res.json();

          head = new AvaturnHead($avatar, {
            sessionToken: token,
            apiHost,
            audioSource: true,
            immediatelyJoin: true,
          });
          head.on("avatar_started_speaking", () => setStatus("speaking…"));
          head.on("avatar_ended_speaking", () => setStatus("listening…"));
          head.on("local_audio_change", (micOn) => renderMicState(micOn));

          setStatus("connecting…");
          await head.init();
          head.toggleLocalAudio(true);
          renderMicState(true);
          setStatus("listening…");
          $mute.disabled = false;
          $leave.disabled = false;
          setState("active");
        } catch (err) {
          console.error(err);
          setStatus(`error: ${err.message}`);
          setState("error");
          $join.disabled = false;
        }
      });

      $mute.addEventListener("click", () => {
        if (!head) return;
        const next = $mute.classList.contains("muted");
        head.toggleLocalAudio(next);
        renderMicState(next);
      });

      $leave.addEventListener("click", async () => {
        $leave.disabled = true;
        $mute.disabled = true;
        setState("leaving");
        setStatus("leaving…");
        try {
          await head?.dispose();
          head = null;
        } finally {
          // SDK doesn't remove the container it appended to #avatar; left
          // behind, it stacks under the next session's video on rejoin.
          $avatar.replaceChildren();
          setStatus("idle");
          setState("idle");
          $join.disabled = false;
          renderMicState(true);
        }
      });
    </script>
  </body>
</html>
